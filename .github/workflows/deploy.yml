name: Deploy to Firebase

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting, Database Rules and Functions
        run: npx firebase-tools deploy --only hosting:admin,database,functions --token "${{ secrets.FIREBASE_TOKEN }}"
